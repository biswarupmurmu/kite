site_name: Kite
site_url: https://biswarupmurmu.github.io/kite/
site_description: A lightning-fast, zero-dependency ASGI web framework for Python.
repo_url: https://github.com/biswarupmurmu/kite
repo_name: biswarupmurmu/kite
theme:
    name: material
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - content.code.copy # Adds a copy button to all code blocks!
        - navigation.sections
        - navigation.footer

markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences

nav:
    - Home: index.md
    - Quickstart: quickstart.md
    - Core Concepts:
          - Routing & Parameters: routing.md
          - Request handlers: handlers.md
          - Requests & Responses: requests-responses.md
          - Middleware: middleware.md
    - Under the Hood:
          - Routing: architecture/routing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra:
    generator: false
